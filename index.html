<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#f7f4ea" />
    <meta
      name="description"
      content="建築物室內裝修工程管理乙級題庫 PWA，支援80題模擬測驗、完整題庫、錯題、收藏與本機複習紀錄。"
    />
    <title>室內裝修工程管理乙級題庫</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("design-license-pwa-theme-v1");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
          document.querySelector('meta[name="theme-color"]').setAttribute("content", theme === "dark" ? "#141915" : "#f7f4ea");
        } catch (error) {}
      })();
    </script>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon-192.png?v=20260604-book" type="image/png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png?v=20260604-book" />
    <link rel="stylesheet" href="src/styles.css?v=20260604-multi" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <main class="loading-view">
        <p class="eyebrow">12600 乙級</p>
        <h1>室內裝修工程管理題庫</h1>
        <p>正在載入題庫資料...</p>
      </main>
    </div>
    <script src="src/app.js?v=20260604-multi" defer></script>
  </body>
</html>
